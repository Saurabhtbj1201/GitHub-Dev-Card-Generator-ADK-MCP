<!DOCTYPE html>
<html lang="en" data-backend-url="${BACKEND_URL}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-bright: #f0f6fc;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
            --border: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            color: var(--text-bright);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subheading {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 2.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-bright);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        #result-area {
            margin-top: 2rem;
            min-height: 200px;
        }

        /* Loading Skeleton */
        .skeleton {
            display: none;
            width: 350px;
            height: 450px;
            background: var(--card-bg);
            margin: 0 auto;
            border-radius: 15px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-msg {
            color: var(--error);
            background: rgba(248, 81, 73, 0.1);
            padding: 12px;
            border-radius: 8px;
            display: none;
            margin-top: 1rem;
        }

        .actions {
            margin-top: 1.5rem;
            display: none;
            justify-content: center;
        }

        .btn-secondary {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Dev Card</h1>
        <p class="subheading">Enter any public GitHub username</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false">
            <button id="gen-btn" onclick="generateCard()">Generate Card</button>
        </div>

        <div id="error" class="error-msg"></div>

        <div id="result-area">
            <div id="loading" class="skeleton"></div>
            <div id="card-container"></div>
            <div id="actions" class="actions">
                <button class="btn-secondary" onclick="copyLink()">Share Card Link</button>
            </div>
        </div>
    </div>

    <script>
        let currentUrl = '';

        function resolveBackendUrl() {
            const raw = (document.documentElement.dataset.backendUrl || '').trim();
            const looksLikeUrl = /^https?:\/\//i.test(raw);

            if (looksLikeUrl) return raw.replace(/\/$/, '');

            // Local dev fallback (when serving index.html directly / via `python -m http.server`)
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '::1') {
                return 'http://localhost:8080';
            }

            // If deployed somewhere without BACKEND_URL configured, fail loudly.
            return '';
        }

        function joinUrl(base, path) {
            if (!base) return path;
            return `${base.replace(/\/$/, '')}${path.startsWith('/') ? '' : '/'}${path}`;
        }

        async function generateCard() {
            const username = document.getElementById('username').value.trim();
            const btn = document.getElementById('gen-btn');
            const skeleton = document.getElementById('loading');
            const cardContainer = document.getElementById('card-container');
            const actions = document.getElementById('actions');
            const error = document.getElementById('error');

            const backendUrl = resolveBackendUrl();
            if (!backendUrl) {
                error.innerText = 'Error: BACKEND_URL is not configured.';
                error.style.display = 'block';
                return;
            }

            if (!username) return;

            // Reset UI
            btn.disabled = true;
            error.style.display = 'none';
            cardContainer.innerHTML = '';
            actions.style.display = 'none';
            skeleton.style.display = 'block';

            try {
                const response = await fetch(joinUrl(backendUrl, '/generate'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'User not found or profile is private');
                }

                const data = await response.json();
                
                // Set result
                skeleton.style.display = 'none';
                cardContainer.innerHTML = `<div class="fade-in">${data.html}</div>`;
                actions.style.display = 'flex';
                currentUrl = joinUrl(backendUrl, data.card_url);
                
            } catch (err) {
                skeleton.style.display = 'none';
                error.innerText = `Error: ${err.message}`;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }

        function copyLink() {
            if (!currentUrl) return;
            navigator.clipboard.writeText(currentUrl).then(() => {
                const btn = document.querySelector('.btn-secondary');
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.borderColor = '#238636';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.borderColor = '#30363d';
                }, 2000);
            });
        }

        // Handle enter key
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateCard();
        });
    </script>
</body>
</html>
